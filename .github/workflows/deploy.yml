name: Deployment
on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]
  pull_request:
    types: [labeled]

jobs:
  build-frontend:
    runs-on: self-hosted
    if: "${{ (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'  && github.event.label.name == 'Action: Deploy PR') || (github.event.action == 'labeled' && github.event.label.name == 'Action: Deploy PR')}}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: |
            registry.kube.com/aksa-frontend
          tags: |
            type=ref,event=pr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
        with:
          driver: docker

      - name: Build and push Frontend
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=registry.kube.com/aksa-frontend:latest
          cache-to: type=inline

  build-server:
    runs-on: self-hosted
    if: "${{ (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'  && github.event.label.name == 'Action: Deploy PR') || (github.event.action == 'labeled' && github.event.label.name == 'Action: Deploy PR')}}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: |
            registry.kube.com/aksa-server
          tags: |
            type=ref,event=pr
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
        with:
          driver: docker

      - name: Build and push Server
        uses: docker/build-push-action@v2
        with:
          context: ./server/src
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=registry.kube.com/aksa-server:latest
          cache-to: type=inline

  deploy-pr:
    name: Deploy Feature Branch
    runs-on: self-hosted
    if: "${{ (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'  && github.event.label.name == 'Action: Deploy PR') || (github.event.action == 'labeled' && github.event.label.name == 'Action: Deploy PR')}}"
    needs: [build-frontend, build-server]
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: generate values-dev.yaml
        run: |
          PR_NUMBER=$(echo $GITHUB_REF | awk 'BEGIN { FS = "/" } ; { print $3 }')
          cat > values-dev.yaml << EOF
          hostname: $PR_NUMBER.aksa.fra.ics.kazanci.io
          cert:
            enabled: true
            name: aksa-cert-$PR_NUMBER
          frontend:
            image: registry.kube.com/aksa-frontend:$PR_NUMBER
            imagePullPolicy: Always
          server:
            image: registry.kube.com/aksa-server:$PR_NUMBER
            imagePullPolicy: Always
          EOF

      - name: deploy pr
        run: |
          kubectl get po -n aksa-$PR_NUMBER  | grep 'Running\|Completed' && helm uninstall aksa-$PR_NUMBER -n aksa-$PR-NUMBER && kubectl delete ns aksa-$PR_NUMBER
          kubectl wait --for=delete namespace/aksa-$PR_NUMBER --timeout=60s
          helm dep up deployment/chart/
          helm install aksa-$PR_NUMBER ./deployment/chart -f values-dev.yaml --namespace aksa-$PR_NUMBER --create-namespace

  deploy-main:
    name: Deploy Main Branch
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'}}
    steps:
      - name: deploy main
        run: |
          helm uninstall aksa-main --namespace aksa-main --wait
          helm dep up deployment/chart/
          helm install aksa-main ./deployment/chart -f ./deployment/chart/env/dev.yaml --namespace aksa-main

