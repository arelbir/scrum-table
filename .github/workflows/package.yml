name: Package

on:
  workflow_call:
    outputs:
      frontend-image-tag:
        description: The tag of the frontend image
        value: ${{ jobs.merge-frontend-images.outputs.frontend-image-tag }}
      server-image-tag:
        description: The tag of the server image
        value: ${{ jobs.merge-server-images.outputs.server-image-tag }}

env:
  FRONTEND_IMAGE: registry.aksa.local/aksa/aksa-frontend
  SERVER_IMAGE: registry.aksa.local/aksa/aksa-server

jobs:
  package-frontend:
    name: Build frontend (${{ matrix.build_info.platform }})
    runs-on: ${{ matrix.build_info.runner }}
    strategy:
      fail-fast: false
      matrix:
        build_info:
          - { platform: 'linux/amd64', pair: "linux-amd64", runner: 'ubuntu-latest' }
          - { platform: 'linux/arm64', pair: "linux-arm64", runner: 'ubuntu-24.04-arm' }
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: registry.aksa.local
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Frontend metadata (${{ matrix.build_info.platform }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          labels: |
            org.opencontainers.image.authors=iletisim@aksa.com
            org.opencontainers.image.url=https://registry.aksa.local/aksa/aksa-frontend
            org.opencontainers.image.source=https://aksa.local/scrum
            org.opencontainers.image.vendor=kazanci
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.title=aksa.local Frontend
            org.opencontainers.image.description=The web client for aksa.local

      - name: Build & push frontend (${{ matrix.build_info.platform }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.build_info.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.FRONTEND_IMAGE }}
          cache-from: type=registry,ref=registry.aksa.local/aksa/aksa-frontend:cache
          cache-to: type=registry,ref=registry.aksa.local/aksa/aksa-frontend:cache,mode=max
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: frontend-digests-${{ matrix.build_info.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-frontend-images:
    name: Merge frontend images
    runs-on: ubuntu-latest
    needs:
      - package-frontend
    permissions:
      contents: read
      packages: write
    outputs:
      frontend-image-tag: ${{ steps.outputs.outputs.frontend-image-tag }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: frontend-digests-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: registry.aksa.local
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Frontend metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.authors=iletisim@aksa.com
            org.opencontainers.image.url=https://registry.aksa.local/aksa/aksa-frontend
            org.opencontainers.image.source=https://aksa.local/scrum
            org.opencontainers.image.vendor=kazanci
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.title=aksa.local Frontend
            org.opencontainers.image.description=The web client for aksa.local

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.FRONTEND_IMAGE }}@sha256:%s ' *)

      - name: Set outputs
        id: outputs
        run: |
          echo $DOCKER_METADATA_OUTPUT_TAGS
          echo _____________________________________________________
          echo frontend-image-tag=$(echo "$(echo $DOCKER_METADATA_OUTPUT_TAGS | grep -oP 'sha-[a-f0-9]+')" ) >> $GITHUB_OUTPUT

  package-server:
    name: Build server (${{ matrix.build_info.platform }})
    runs-on: ${{ matrix.build_info.runner }}
    strategy:
      fail-fast: false
      matrix:
        build_info:
          - { platform: 'linux/amd64', pair: "linux-amd64", runner: 'ubuntu-latest' }
          - { platform: 'linux/arm64', pair: "linux-arm64", runner: 'ubuntu-24.04-arm' }
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: registry.aksa.local
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Server metadata (${{ matrix.build_info.platform }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SERVER_IMAGE }}
          labels: |
            org.opencontainers.image.authors=iletisim@aksa.com
            org.opencontainers.image.url=https://registry.aksa.local/aksa/aksa-server
            org.opencontainers.image.source=https://aksa.local/scrum
            org.opencontainers.image.vendor=kazanci
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.title=aksa.local Server
            org.opencontainers.image.description=The server for aksa.local

      - name: Build & push server (${{ matrix.build_info.platform }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./server/src
          file: ./server/src/Dockerfile
          platforms: ${{ matrix.build_info.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.SERVER_IMAGE }}
          cache-from: type=registry,ref=registry.aksa.local/aksa/aksa-server:cache
          cache-to: type=registry,ref=registry.aksa.local/aksa/aksa-server:cache,mode=max
          outputs: type=image,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: server-digests-${{ matrix.build_info.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-server-images:
    name: Merge server images
    runs-on: ubuntu-latest
    needs:
      - package-server
    permissions:
      contents: read
      packages: write
    outputs:
      server-image-tag: ${{ steps.outputs.outputs.server-image-tag }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: server-digests-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: registry.aksa.local
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Server metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.authors=iletisim@aksa.com
            org.opencontainers.image.url=https://registry.aksa.local/aksa/aksa-server
            org.opencontainers.image.source=https://aksa.local/scrum
            org.opencontainers.image.vendor=kazanci
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.title=aksa.local Server
            org.opencontainers.image.description=The server for aksa.local

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.SERVER_IMAGE }}@sha256:%s ' *)

      - name: Set outputs
        id: outputs
        run: |
          echo $DOCKER_METADATA_OUTPUT_TAGS
          echo _____________________________________________________
          echo server-image-tag=$(echo "$(echo $DOCKER_METADATA_OUTPUT_TAGS | grep -oP 'sha-[a-f0-9]+')" ) >> $GITHUB_OUTPUT





