apiVersion: v1
kind: Service
metadata:
  namespace: aksa
  name: aksa-frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  namespace: aksa
  name: aksa-landing-page
spec:
  selector:
    app: landing-page
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: aksa
  name: landing-page
  labels:
    app: landing-page
spec:
  replicas: 3
  selector:
    matchLabels:
      app: landing-page
  template:
    metadata:
      labels:
        app: landing-page
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: landing-page
          securityContext:
            allowPrivilegeEscalation: false
          image: registry.aksa.local/aksa/landing-page:sha-3db9234
          resources:
            requests:
              cpu: "200m"
              memory: "200Mi"
            limits:
              cpu: "400m"
              memory: "400Mi"
          ports:
            - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: aksa
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          securityContext:
            allowPrivilegeEscalation: false
          image: registry.aksa.local/aksa/aksa-frontend:3.7.1
          resources:
            requests:
              cpu: "200m"
              memory: "200Mi"
            limits:
              cpu: "400m"
              memory: "400Mi"
          env:
            # - name: AKSA_SERVER_PORT
            #   value: "80"
            - name: AKSA_SERVER_URL
              value: /api
            # - name: AKSA_WEBSOCKET_URL
            #   value: /api
            - name: AKSA_SHOW_LEGAL_DOCUMENTS
              value: "false"
          ports:
            - containerPort: 80
---
apiVersion: traefik.io/v1alpha1 
kind: IngressRoute
metadata:
  namespace: aksa
  name: aksa-ingressroute
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${AKSA_DEPLOYMENT_DOMAIN}`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: aksa-backend
          port: 8080
      middlewares:
        - name: aksa-ratelimit
    - match: Host(`${AKSA_DEPLOYMENT_DOMAIN}`) && (PathPrefix(`/static`) || PathPrefix(`/locales`) || PathPrefix(`/login`) || PathPrefix(`/board`) || PathPrefix(`/new`) || PathPrefix(`/timer_finished.mp3`) || PathPrefix(`/hotkeys.pdf`) || PathPrefix(`/manifest.json`) || PathPrefix(`/service-worker.js`) || PathPrefix(`/emoji-data/`))
      kind: Rule
      services:
        - name: aksa-frontend
          port: 80
      middlewares:
        - name: aksa-ratelimit
    - match: Host(`${AKSA_DEPLOYMENT_DOMAIN}`)
      kind: Rule
      services:
        - name: aksa-landing-page
          port: 80
      middlewares:
        - name: aksa-ratelimit

  tls:
    secretName: aksa-cert
---
apiVersion: traefik.io/v1alpha1 
kind: IngressRoute
metadata:
  namespace: aksa
  name: aksa-redirect-nonwww
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`www.${AKSA_DEPLOYMENT_DOMAIN}`)
      kind: Rule
      services:
        - name: aksa-landing-page
          port: 80
      middlewares:
        - name: aksa-ratelimit
        - name: redirect-to-nonwww
---
# redirect middleware

apiVersion: traefik.io/v1alpha1 
kind: Middleware
metadata:
  namespace: aksa
  name: redirect-to-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# redirect www to non-www
apiVersion: traefik.io/v1alpha1 
kind: Middleware
metadata:
  name: redirect-to-nonwww
  namespace: aksa
spec:
  redirectRegex:
    regex: "^https://www\\.(.*)"
    replacement: "https://$1"
    permanent: true
---
# redirect to https
apiVersion: traefik.io/v1alpha1 
kind: IngressRoute
metadata:
  namespace: aksa
  name: aksa-http-redirect
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${AKSA_DEPLOYMENT_DOMAIN}`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
        - name: aksa-ratelimit
      services:
        - name: noop@internal
          kind: TraefikService
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  namespace: aksa
  name: aksa-cert
spec:
  secretName: aksa-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: ${AKSA_DEPLOYMENT_DOMAIN}
  dnsNames:
    - ${AKSA_DEPLOYMENT_DOMAIN}
    - www.${AKSA_DEPLOYMENT_DOMAIN}
---
# ratelimit middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: aksa-ratelimit
  namespace: aksa
spec:
  rateLimit:
    average: 100
    burst: 500



