---
services:
  aksa-backend:
    restart: always
    image: "aksa-backend:local"
    build:
      context: ../../server/src
    container_name: aksa-backend
    command:
      - "-disable-check-origin"
    environment:
      AKSA_LOG_LEVEL: "${AKSA_LOG_LEVEL:-INFO}"
      AKSA_SERVER_PORT: "${AKSA_SERVER_PORT:-8080}"
      AKSA_BASE_PATH: "${AKSA_BASE_PATH:-/api}"
      AKSA_ALLOW_ANONYMOUS_BOARD_CREATION: "${AKSA_ALLOW_ANONYMOUS_BOARD_CREATION:-true}"
      AKSA_ALLOW_ANONYMOUS_CUSTOM_TEMPLATES: "${AKSA_ALLOW_ANONYMOUS_CUSTOM_TEMPLATES:-true}"
      AKSA_INSECURE: "${AKSA_INSECURE}"
      AKSA_PRIVATE_KEY: "${AKSA_PRIVATE_KEY}"
      AKSA_SERVER_DATABASE_URL: "postgres://${POSTGRES_USER:-aksa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aksa}?sslmode=disable"
      AKSA_SERVER_NATS_URL: "${AKSA_SERVER_NATS_URL:-nats://nats:4222}"
      # Redis variables (if set, backend uses Redis broker instead of NATS)
      AKSA_SERVER_REDIS_HOST: "${REDIS_HOST:-redis:6379}"
      AKSA_SERVER_REDIS_USERNAME: "${REDIS_USERNAME:-}"
      AKSA_SERVER_REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      AKSA_FEEDBACK_WEBHOOK_URL: "${WEBHOOK_URL}"
      AKSA_AUTH_CALLBACK_HOST: "${AUTH_CALLBACK_HOST}"
      AKSA_AUTH_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      AKSA_AUTH_GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      AKSA_AUTH_MICROSOFT_CLIENT_ID: "${MICROSOFT_CLIENT_ID}"
      AKSA_AUTH_MICROSOFT_CLIENT_SECRET: "${MICROSOFT_CLIENT_SECRET}"
      AKSA_AUTH_GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID}"
      AKSA_AUTH_GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET}"
      AKSA_AUTH_AZURE_AD_TENANT_ID: "${AZURE_AD_TENANT_ID}"
      AKSA_AUTH_AZURE_AD_CLIENT_ID: "${AZURE_AD_CLIENT_ID}"
      AKSA_AUTH_AZURE_AD_CLIENT_SECRET: "${AZURE_AD_CLIENT_SECRET}"
      AKSA_AUTH_APPLE_CLIENT_ID: "${APPLE_CLIENT_ID}"
      AKSA_AUTH_APPLE_CLIENT_SECRET: "${APPLE_CLIENT_SECRET}"
      AKSA_AUTH_OIDC_CLIENT_ID: "${OIDC_CLIENT_ID}"
      AKSA_AUTH_OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET}"
      AKSA_AUTH_OIDC_DISCOVERY_URL: "${OIDC_DISCOVERY_URL}"
      SESSION_SECRET: "${SESSION_SECRET}"
      AKSA_ENABLE_EXPERIMENTAL_AUTH_FILE_SYSTEM_STORE: "${AKSA_ENABLE_EXPERIMENTAL_AUTH_FILE_SYSTEM_STORE}"
      AKSA_OTEL_GRPC: "${AKSA_OTEL_GRPC}"
      AKSA_OTEL_HTTP: "${AKSA_OTEL_HTTP}"
      # AKSA_CONFIG_PATH: "${AKSA_CONFIG_PATH}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "/healthcheck"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  aksa-frontend:
    restart: always
    image: "aksa-frontend:local"
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: aksa-frontend
    environment:
      AKSA_LISTEN_PORT: "${AKSA_LISTEN_PORT:-8080}"
      AKSA_SERVER_URL: "${AKSA_SERVER_URL}"
      AKSA_WEBSOCKET_URL: "${AKSA_WEBSOCKET_URL}"
      AKSA_SHOW_LEGAL_DOCUMENTS: "${AKSA_SHOW_LEGAL_DOCUMENTS}"
      AKSA_ANALYTICS_DATA_DOMAIN: "${ANALYTICS_DATA_DOMAIN}"
      AKSA_ANALYTICS_SRC: "${ANALYTICS_SRC}"
      AKSA_CLARITY_ID: "${AKSA_CLARITY_ID}"
    depends_on:
      aksa-backend:
        condition: service_healthy

  postgres:
    restart: always
    image: "postgres:${POSTGRES_VERSION:-18.1}"
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aksa}
      POSTGRES_USER: ${POSTGRES_USER:-aksa}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aksa} -d ${POSTGRES_DB:-aksa}"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    restart: always
    image: "redis:${REDIS_VERSION:-8.4.0}"
    container_name: aksa-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    restart: always
    image: "nats:${NATS_VERSION:-2.12.3}"
    container_name: nats

  # oidc.localhost:
  #   restart: always
  #   image: ghcr.io/dexidp/dex:v2.41.1-distroless
  #   container_name: oidc.localhost
  #   volumes:
  #     - ./dex.yaml:/etc/dex/config.docker.yaml:ro
  #   ports:
  #     - "5556:5556"
  #   profiles:
  #     - oidc

  caddy:
    restart: always
    image: "caddy:${CADDY_VERSION:-2.10.2}"
    container_name: caddy
    environment:
      AKSA_SERVER_PORT: "${AKSA_SERVER_PORT:-8080}"
      AKSA_LISTEN_PORT: "${AKSA_LISTEN_PORT:-8080}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    ports:
      - "3001:80"
      - "443:443"

volumes:
  postgres_data:



