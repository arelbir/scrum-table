---
suite: test frontend secrets
templates:
  - /frontend/secrets.yaml
tests:
  - it: should set name, namespace, apiVersion and kind
    release:
      name: aksa
      namespace: aksa
    set:
      frontend.secrets.test: test
    asserts:
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: aksa-frontend-secrets
          namespace: aksa

  - it: should be of type opaque
    release:
      name: aksa
      namespace: aksa
    set:
      frontend.secrets.test: test
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should not set secret if no secrets are set
    release:
      name: aksa
      namespace: aksa
    set:
      frontend.secretRef: aksa-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should not set secret if secret ref is set
    release:
      name: aksa
      namespace: aksa
    set:
      frontend.secretRef: aksa-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should set secrets
    release:
      name: aksa
      namespace: aksa
    set:
      frontend.secrets.AKSA_ANALYTICS_DATA_DOMAIN: ThisIsNotAAnaliticsDomain
      frontend.secrets.Aksa_Clarity_Id: ThisIsNotAClarityId
    asserts:
      - exists:
          path: data.AKSA_ANALYTICS_DATA_DOMAIN
      - equal:
          path: data.AKSA_ANALYTICS_DATA_DOMAIN
          value: VGhpc0lzTm90QUFuYWxpdGljc0RvbWFpbg==
      - exists:
          path: data.AKSA_CLARITY_ID
      - equal:
          path: data.AKSA_CLARITY_ID
          value: VGhpc0lzTm90QUNsYXJpdHlJZA==





