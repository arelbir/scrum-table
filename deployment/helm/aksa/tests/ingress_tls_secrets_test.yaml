---
suite: test ingress tls secrets
templates:
  - /ingress_tls_secrets.yaml
tests:
  - it: should generate self signed certificate
    release:
      name: aksa
      namespace: aksa
    set:
      ingress.enabled: true
      ingress.selfSigned: true
    asserts:
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: aksa.local-tls
          namespace: aksa
      - equal:
          path: type
          value: kubernetes.io/tls
      - isNotEmpty:
          path: data.tls.crt
      - isNotEmpty:
          path: data.tls.key
      - isNotEmpty:
          path: data.ca.crt

  - it: should set self signed certificate namespace from release namespace
    release:
      name: aksa
      namespace: another-namespace
    set:
      ingress.enabled: true
      ingress.selfSigned: true
    asserts:
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: aksa.local-tls
          namespace: another-namespace
      - equal:
          path: type
          value: kubernetes.io/tls
      - isNotEmpty:
          path: data.tls.crt
      - isNotEmpty:
          path: data.tls.key
      - isNotEmpty:
          path: data.ca.crt

  - it: should set given certificate
    release:
      name: aksa
      namespace: aksa
    set:
      ingress.enabled: true
      ingress.secrets:
        - name: aksa-cert
          certificate: ThisIsNotACertificate
          key: ThisIsNotAKey
        - name: aksa-cert-2
          certificate: ThisIsNotACertificateAgain
          key: ThisIsNotAKeyAgain
    asserts:
      - hasDocuments:
          count: 2
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: aksa-cert
          namespace: aksa
        documentIndex: 0
      - equal:
          path: type
          value: kubernetes.io/tls
        documentIndex: 0
      - isNotEmpty:
          path: data.tls.crt
        documentIndex: 0
      - isNotEmpty:
          path: data.tls.key
        documentIndex: 0
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: aksa-cert-2
          namespace: aksa
        documentIndex: 1
      - equal:
          path: type
          value: kubernetes.io/tls
        documentIndex: 1
      - isNotEmpty:
          path: data.tls.crt
        documentIndex: 1
      - isNotEmpty:
          path: data.tls.key
        documentIndex: 1

  - it: should set given certificate and generate self signed
    release:
      name: aksa
      namespace: aksa
    set:
      ingress.enabled: true
      ingress.selfSigned: true
      ingress.secrets:
        - name: aksa-cert
          certificate: ThisIsNotACertificate
          key: ThisIsNotAKey
        - name: aksa-cert-2
          certificate: ThisIsNotACertificateAgain
          key: ThisIsNotAKeyAgain
    asserts:
      - hasDocuments:
          count: 3
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: aksa-cert
          namespace: aksa
        documentIndex: 0
      - equal:
          path: type
          value: kubernetes.io/tls
        documentIndex: 0
      - isNotEmpty:
          path: data.tls.crt
        documentIndex: 0
      - isNotEmpty:
          path: data.tls.key
        documentIndex: 0
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: aksa-cert-2
          namespace: aksa
        documentIndex: 1
      - equal:
          path: type
          value: kubernetes.io/tls
        documentIndex: 1
      - isNotEmpty:
          path: data.tls.crt
        documentIndex: 1
      - isNotEmpty:
          path: data.tls.key
        documentIndex: 1
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: aksa.local-tls
          namespace: aksa
        documentIndex: 2
      - equal:
          path: type
          value: kubernetes.io/tls
        documentIndex: 2
      - isNotEmpty:
          path: data.tls.crt
        documentIndex: 2
      - isNotEmpty:
          path: data.tls.key
        documentIndex: 2
      - isNotEmpty:
          path: data.ca.crt
        documentIndex: 2

