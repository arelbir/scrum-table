### This file is used to automatically deploy the application to the development environment.
apiVersion: v1
kind: Service
metadata:
  name: aksa-backend-PR_NUMBER
spec:
  selector:
    app: aksa-PR_NUMBER
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aksa-deployment-PR_NUMBER
  labels:
    app: aksa-PR_NUMBER
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aksa-PR_NUMBER
  template:
    metadata:
      labels:
        app: aksa-PR_NUMBER
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aksa
          securityContext:
            allowPrivilegeEscalation: false
          image: registry.aksa.local/aksa/aksa-server
          args:
            - "-disable-check-origin"
          resources:
            requests:
              cpu: "10m"
              memory: "50Mi"
          env:
            - name: AKSA_SERVER_PORT
              value: "8080"
            - name: AKSA_LOG_LEVEL
              value: "INFO"
            - name: AKSA_API_HOST
              value: "https://PR_NUMBER.development.aksa.fra.ics.kazanci.io"
            - name: AKSA_SERVER_NATS_URL
              value: nats://nats-PR_NUMBER:4222
            - name: AKSA_AUTH_CALLBACK_HOST
              value: "https://PR_NUMBER.development.aksa.fra.ics.kazanci.io"
            - name: AKSA_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: aksa-ecdsa-key
                  key: private_key
            - name: AKSA_SERVER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-url-PR_NUMBER
                  key: url
            - name: AKSA_AUTH_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aksa-secrets
                  key: GOOGLE_CLIENT_ID
            - name: AKSA_AUTH_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aksa-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: AKSA_AUTH_MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aksa-secrets
                  key: MICROSOFT_CLIENT_ID
            - name: AKSA_AUTH_MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aksa-secrets
                  key: MICROSOFT_CLIENT_SECRET
            - name: AKSA_FEEDBACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: aksa-secrets
                  key: WEBHOOK_URL
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: aksa-secrets
                  key: SESSION_SECRET
            - name: AKSA_BASE_PATH
              value: "/api"
            - name: AKSA_ALLOW_ANONYMOUS_CUSTOM_TEMPLATES
              value: "true"
            - name: AKSA_ALLOW_ANONYMOUS_BOARD_CREATION
              value: "true"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: aksa-frontend-PR_NUMBER
spec:
  selector:
    app: frontend-PR_NUMBER
  ports:
    - port: 80
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment-PR_NUMBER
  labels:
    app: frontend-PR_NUMBER
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-PR_NUMBER
  template:
    metadata:
      labels:
        app: frontend-PR_NUMBER
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          securityContext:
            allowPrivilegeEscalation: false
          image: registry.aksa.local/aksa/aksa-frontend
          resources:
            requests:
              cpu: "10m"
              memory: "50Mi"
          env:
            # - name: AKSA_SERVER_PORT
            #   value: "80"
            - name: AKSA_SERVER_URL
              value: /api
            # - name: AKSA_WEBSOCKET_URL
            #   value: /api
            - name: AKSA_SHOW_LEGAL_DOCUMENTS
              value: "false"
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: aksa-landing-page-PR_NUMBER
spec:
  selector:
    app: landing-page-PR_NUMBER
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-page-PR_NUMBER
  labels:
    app: landing-page-PR_NUMBER
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing-page-PR_NUMBER
  template:
    metadata:
      labels:
        app: landing-page-PR_NUMBER
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: landing-page
          securityContext:
            allowPrivilegeEscalation: false
          image: registry.aksa.local/aksa/landing-page:latest
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "200m"
              memory: "200Mi"
          ports:
            - containerPort: 8080
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: aksa-ingressroute-PR_NUMBER
  annotations:
    external-dns.alpha.kubernetes.io/target: ingress.dev.aksa.fra.ics.kazanci.io.
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`PR_NUMBER.development.aksa.fra.ics.kazanci.io`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: aksa-backend-PR_NUMBER
          port: 8080
    - match: Host(`PR_NUMBER.development.aksa.fra.ics.kazanci.io`) && (PathPrefix(`/static`) || PathPrefix(`/locales`) || PathPrefix(`/login`) || PathPrefix(`/board`) || PathPrefix(`/new`)  || PathPrefix(`/timer_finished.mp3`) || PathPrefix(`/hotkeys.pdf`) || PathPrefix(`/emoji-data/`))
      kind: Rule
      services:
        - name: aksa-frontend-PR_NUMBER
          port: 80
    - match: Host(`PR_NUMBER.development.aksa.fra.ics.kazanci.io`)
      kind: Rule
      services:
        - name: aksa-landing-page-PR_NUMBER
          port: 80

  tls:
    secretName: aksa-development-certificate-PR_NUMBER
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: aksa-development-certificate-PR_NUMBER
spec:
  secretName: aksa-development-certificate-PR_NUMBER
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  commonName: PR_NUMBER.development.aksa.fra.ics.kazanci.io
  dnsNames:
    - PR_NUMBER.development.aksa.fra.ics.kazanci.io
---
# Database for the deployment
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cluster-PR_NUMBER
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  instances: 1
  storage:
    storageClass: csi-cinder-sc-delete
    size: 1Gi
  affinity:
    enablePodAntiAffinity: true
    topologyKey: failure-domain.beta.kubernetes.io/zone
  postgresql:
    parameters:
      shared_buffers: 256MB
      max_connections: "200"
  bootstrap:
    initdb:
      database: aksa
      owner: aksa
      secret:
        name: postgresql-creds
---
# secret containing the database url
apiVersion: v1
kind: Secret
metadata:
  name: postgres-url-PR_NUMBER
type: Opaque
stringData:
  url: postgres://aksa:POSTGRES_DEV_PASSWORD@cluster-PR_NUMBER-rw:5432/aksa
---
# nats repository
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nats
spec:
  interval: 30m
  url: https://nats-io.github.io/k8s/helm/charts/
---
# nats deployment
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nats-PR_NUMBER
spec:
  releaseName: nats-PR_NUMBER
  chart:
    spec:
      chart: nats
      version: 0.19.12
      sourceRef:
        kind: HelmRepository
        name: nats
  install: {}
  interval: 10m0s
  targetNamespace: aksa-dev-deployments



