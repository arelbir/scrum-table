server {
    # Redirect alternative domains to aksa.local
    listen ${AKSA_LISTEN_PORT};
    listen [::]:${AKSA_LISTEN_PORT};
    server_name aksa.local;

    location / {
      return 301 https://aksa.local$request_uri;
}
}

server {
    listen ${AKSA_LISTEN_PORT} default_server;
    listen [::]:${AKSA_LISTEN_PORT} default_server;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
    gzip_proxied no-cache no-store private expired auth;
    gzip_min_length 1024;
    gzip_disable "MSIE [1-6]\.";

    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /index.html {
      # Application specific feature toggles
      add_header Set-Cookie "aksa__show-legal-documents=${AKSA_SHOW_LEGAL_DOCUMENTS};Path=/;Max-Age=3600";
      add_header Set-Cookie "aksa__server-url=${AKSA_SERVER_URL};Path=/;Max-Age=3600";
      add_header Set-Cookie "aksa__websocket-url=${AKSA_WEBSOCKET_URL};Path=/;Max-Age=3600";
      add_header Set-Cookie "aksa__analytics_data_domain=${AKSA_ANALYTICS_DATA_DOMAIN};Path=/;Max-Age=3600";
      add_header Set-Cookie "aksa__analytics_src=${AKSA_ANALYTICS_SRC};Path=/;Max-Age=3600";
      add_header Set-Cookie "aksa__clarity_id=${AKSA_CLARITY_ID};Path=/;Max-Age=3600";

      # Disable caching for index.html
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      add_header Pragma no-cache;
      expires 0;
    }

    location ~* \.(js|json)$ {
        # Cache JS and JSON files for 3 days
        expires 3d;
        add_header Cache-Control "public, must-revalidate";
    }

    location ~* \.(jpg|jpeg|gif|png|svg|css)$ {
        # Cache other media files for 14 days
        expires 14d;
        add_header Cache-Control "public";
    }

    location ~* \.(ico|mp3)$ {
      # Cache .mp3 and .ico files for 365 days
      add_header Cache-Control "max-age=36792000, public";
    }
}


